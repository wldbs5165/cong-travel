<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>

    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <section class="onboarding-question">
          <div class="question-content">
            <div class="question-step">
              <img src="assets/icons/진행.png" alt="진행" />
              <a href="#">
                <img src="assets/icons/미진행.png" alt="미진행" />

              <a href="#">

              <a href="#">

              <a href="#">

            </div>
            <div class="question-group">
              <h2 class="question-title">Q1. 어떤 여행을 원하시나요?</h2>
              <div class="choice-list">
                <label class="choice-item">
                  <input type="radio" name="style" value="Relax" />

                </label>
                <label class="choice-item">
                  <input type="radio" name="style" value="Tour" />
                  <span>관광</span>
                </label>
                <label class="choice-item">
                  <input type="radio" name="style" value="Activity" />
                  <span>액티비티</span>
                </label>
                <label class="choice-item">
                  <input type="radio" name="style" value="Nature" />

          </div>

      </div>
