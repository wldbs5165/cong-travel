<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사용자 성향 기반 여행 추천 서비스 애플리케이션 프로젝트</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <header class="header"></header>
      <main class="container">
        <h1 class="heading-1">Heading-1</h1>
        <div class="heading-2">Heading-2</div>
        <div class="heading-3">Heading-3</div>
        <div>Body</div>
        <div class="caption">Caption</div>
        <button class="btn">버튼</button>
        <button class="btn" disabled>버튼</button>
        <div class="card-container">
          <div class="thumbnail">
            <img src="assets/images/홍콩-상세.png" alt="홍콩 상세 이미지" />
          </div>
          <div class="card-thumbnail">
            <img src="assets/images/방콕-상세.png" alt="방콕 상세 이미지" />
          </div>
        </div>
      </main>
      <footer class="footer"></footer>
    </div>
  </body>
</html>
