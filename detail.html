<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      사용자 성향 기반 여행 추천 서비스 애플리케이션 프로젝트 - 상세
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="detail-section">
      <div class="detail-card">
        <div class="thumbnail">
          <img
            src="assets/images/타이베이-상세.png"
            alt="타이베이 상세 이미지"
          />
        </div>
        <div class="detail-main">
          <div class="detail-title">
            <span class="caption detail-sub"
              >""다양한 먹거리와 편리한 대중교통""</span
            >
            <div class="detail-tag">
              <span class="caption">@ 먹방</span>
              <span class="caption">@ 야시장</span>
              <span class="caption">@ 대중교통</span>
            </div>
          </div>
          <div class="detail-location">
            <img src="assets/icons/map-pin.png" alt="위치 아이콘" />
            <h3>타이베이(대만)</h3>
          </div>
          <div class="detail-info">
            <div class="meta-box">
              <img src="assets/icons/sun.png" alt="날씨 아이콘" />
              <div class="meta-item">
                <span class="caption meta-label">날씨</span>
                <span class="meta-value">28~34도</span>
              </div>
            </div>
            <div class="meta-box">
              <img src="assets/icons/plane.png" alt="비행 아이콘" />
              <div class="meta-item">
                <span class="caption meta-label">비행시간</span>
                <span class="meta-value">4~5시간</span>
              </div>
            </div>
            <div class="meta-box">
              <img src="assets/icons/house-black.png" alt="숙소 아이콘" />
              <div class="meta-item">
                <span class="caption meta-label">숙소</span>
                <span class="meta-value">1박 7,000~150,000</span>
              </div>
            </div>
          </div>
        </div>
        <div class="detail-top">
          <a class="detail-prev" href="home.html">
            <img src="assets/icons/detail-prev.png" alt="디테일-이전 버튼" />
          </a>
          <div class="detail-action">
            <a class="detail-share" href="#">
              <img
                src="assets/icons/detail-share.png"
                alt="디테일- 공유 버튼"
              />
            </a>
            <a class="detail-save" href="#">
              <img src="assets/icons/detail-save.png" alt="디테일- 저장 버튼" />
            </a>
          </div>
        </div>
      </div>
      <div class="sub-card">
        <span>예상 비용</span>
        <div class="meta-box">
          <img src="assets/icons/fork.png" alt="식비 아이콘" />
          <div class="meta-item">
            <span class="caption meta-label">식비</span>
            <span class="meta-value">50,000~80,000</span>
          </div>
        </div>
        <div class="meta-box">
          <img src="assets/icons/bath.png" alt="욕실 아이콘" />
          <div class="meta-item">
            <span class="caption meta-label">숙소</span>
            <span class="meta-value">70,000~150,000</span>
          </div>
        </div>
        <div class="meta-box">
          <img src="assets/icons/van.png" alt="경비 아이콘" />
          <div class="meta-item">
            <span class="caption meta-label">총 예상 경비</span>
            <span class="meta-value">150,000~230,000</span>
          </div>
        </div>
      </div>
    </div>
  </body>
  <nav class="tap-bar">
    <a href="menu.html" class="menu">
      <img src="assets/icons/menu.png" alt="메뉴 버튼" />
      <span>더보기</span>
    </a>
    <a href="search.html" class="search">
      <img src="assets/icons/search.png" alt="검색 버튼" />
      <span>검색</span>
    </a>
    <a href="home.html" class="home">
      <img src="assets/icons/house.png" alt="홈 버튼-onclick" />
      <span>홈</span>
    </a>
    <a href="bookmark.html" class="save">
      <img src="assets/icons/bookmark-white.png" alt="북마크 버튼" />
      <span>저장</span>
    </a>
    <a href="my.html" class="user">
      <img src="assets/icons/user.png" alt="사용자 버튼" />
      <span>내 정보</span>
    </a>
  </nav>
</html>
