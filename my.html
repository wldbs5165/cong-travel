<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      사용자 성향 기반 여행 추천 서비스 애플리케이션 프로젝트 - 마이
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="my-full-layout">
      <div class="full-header-section">
        <a class="prev" href="home.html">
          <img src="assets/icons/perv.png" alt="프리뷰 버튼" />
          <span class="login-is-prev">안녕하세요, 사용자님!</span>
        </a>
        <div class="profile-box">
          <span class="caption id">example123@google.com</span>
          <a class="caption profile-btn" href="#">내정보</a>
        </div>
        <div class="my-travel-box">
          <div class="my-recent-box">
            <h3 class="travel-count">16</h3>
            <span>최근 본 여행지</span>
          </div>
          <div class="my-bookmark-box">
            <h3 class="travel-count">4</h3>
            <span>저장한 여행지</span>
          </div>
          <div class="my-style-box">
            <h3 class="travel-count">3</h3>
            <span>내 여행 스타일</span>
          </div>
        </div>
      </div>
      <div class="my-list-box">
        <div class="my-list">
          <div class="my-list-item">
            <img
              class="my-list-icon"
              src="assets/icons/square-pen.png"
              alt="여행스타일 수정 아이콘"
            />
            <span>여행 스타일 수정</span>
            <img
              class="enter-icon"
              src="assets/icons/next.png"
              alt="이동 아이콘"
            />
          </div>
          <img src="assets/images/my-line.png" alt="마이페이지 라인" />
        </div>
        <div class="my-list">
          <div class="my-list-item">
            <img
              class="my-list-icon"
              src="assets/icons/between-horizontal-end.png"
              alt="예산/관심사 추가 아이콘"
            />
            <span>예산/관심사 추가</span>
            <img
              class="enter-icon"
              src="assets/icons/next.png"
              alt="이동 아이콘"
            />
          </div>
          <img src="assets/images/my-line.png" alt="마이페이지 라인" />
        </div>
        <div class="my-list">
          <div class="my-list-item">
            <img
              class="my-list-icon"
              src="assets/icons/user-pen.png"
              alt="내 프로필 아이콘"
            />
            <span>내 프로필</span>
            <img src="assets/icons/next.png" alt="이동 아이콘" />
          </div>
          <img src="assets/images/my-line.png" alt="마이페이지 라인" />
        </div>
        <div class="my-list">
          <div class="my-list-item">
            <img
              class="my-list-icon"
              src="assets/icons/message-square.png"
              alt="알림설정 아이콘"
            />
            <span>알림설정</span>
            <img
              class="enter-icon"
              src="assets/icons/next.png"
              alt="이동 아이콘"
            />
          </div>
          <img src="assets/images/my-line.png" alt="마이페이지 라인" />
        </div>
        <button class="logout">
          <span class="caption">로그아웃</span>
        </button>
      </div>
    </div>
    <nav class="tap-bar">
      <a href="menu.html" class="menu">
        <img src="assets/icons/menu.png" alt="메뉴 버튼" />
        <span>더보기</span>
      </a>
      <a href="search.html" class="search">
        <img src="assets/icons/search.png" alt="검색 버튼" />
        <span>검색</span>
      </a>
      <a href="home.html" class="home">
        <img src="assets/icons/house.png" alt="홈 버튼-onclick" />
        <span>홈</span>
      </a>
      <a href="bookmark.html" class="save">
        <img src="assets/icons/bookmark-white.png" alt="북마크 버튼" />
        <span>저장</span>
      </a>
      <a href="my.html" class="user">
        <img src="assets/icons/user-onclick.png" alt="사용자 버튼" />
        <span>내 정보</span>
      </a>
    </nav>
  </body>
</html>
