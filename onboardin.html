<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      사용자 성향 기반 여행 추천 서비스 애플리케이션 프로젝트 - 온보딩
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <section class="onboarding-section">
          <header class="header">
            <a class="random-btn" href="#">
              <img src="assets/icons/dices-green.png" alt="랜덤 버튼 아이콘" />
              <span class="random-text">랜덤으로 떠나기</span>
            </a>
            <a class="next" href="#">
              <span class="caption next-text">다음</span>
              <img src="assets/icons/next.png" alt="다음 버튼" />
            </a>
          </header>
          <div class="onboarding-main">
            <img
              src="assets/images/onboarding-img.png"
              alt="온보딩 메인 이미지"
            />
            <h3 class="onboarding-title">
              어디로 떠날지 고민 중인가요?<br />당신에게 딱 맞는 여행을 추천해
              드려요
            </h3>
          </div>
        </section>
      </div>
    </div>
  </body>
  <script type="module" src="./js/script.js"></script>
</html>
