<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      사용자 성향 기반 여행 추천 서비스 애플리케이션 프로젝트 - 추천
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <div class="result-section">
          <div class="logo">
            <img src="assets/icons/logo2.png" alt="홈 로고" />
          </div>
          <div class="result">
            <div class="title">
              <div class="main-title">
                <h2 class="heading-2 user-choice">휴양,가족,3~5월</h2>
                <span>휴양,가족,3~5월</span>
              </div>
              <span class="sub-title"
                >사용자 님에게 가장 잘 맞는 여행지에요!</span
              >
            </div>
            <div class="card">
              <div class="card-img">
                <img
                  src="assets/images/타이베이-상세.png"
                  alt="타이베이 이미지"
                />
              </div>
              <div class="card-name">
                <img src="assets/icons/map-pin.png" alt="위치 아이콘" />
                <h3 card-location>타이베이(대만)</h3>
              </div>
              <span class="card-sub">""다양한 먹거리와 편리한 대중교통""</span>
              <div class="card-tag">
                <span>@ 먹방</span>
                <span>@ 야시장</span>
                <span>@ 대중교통</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
