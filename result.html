<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      사용자 성향 기반 여행 추천 서비스 애플리케이션 프로젝트 - 추천
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <div class="logo">
          <img src="assets/icons/logo2.png" alt="홈 로고" />
        </div>
        <div class="result-section">
          <div class="result">
            <div class="user-choice">
              <div class="main-title">
                <h2 class="heading-2">휴양,가족,3~5월</h2>
                <span>을 선택하신</span>
              </div>
              <span class="sub-title"
                >사용자 님에게 가장 잘 맞는 여행지에요!</span
              >
            </div>
            <div class="card-container"></div>
          </div>
        </div>
      </div>
    </div>
    <nav class="tap-bar">
      <a href="#" class="menu">
        <img src="assets/icons/menu.png" alt="메뉴 버튼" />
        <span>더보기</span>
      </a>
      <a href="#" class="search">
        <img src="assets/icons/search.png" alt="검색 버튼" />
        <span>검색</span>
      </a>
      <a href="#" class="home">
        <img src="assets/icons/house.png" alt="홈 버튼" />
        <span>홈</span>
      </a>
      <a href="#" class="save">
        <img src="assets/icons/bookmark-white.png" alt="북마크 버튼" />
        <span>저장</span>
      </a>
      <a href="#" class="user">
        <img src="assets/icons/user.png" alt="사용자 버튼" />
        <span>내 정보</span>
      </a>
    </nav>
  </body>
  <script type="module" src="./js/module/card.js"></script>
</html>
