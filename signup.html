<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      사용자 성향 기반 여행 추천 서비스 애플리케이션 프로젝트 - 회원가입
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <section class="signup-section">
          <a class="prev" href="#">
            <img src="assets/icons/perv.png" alt="프리뷰 버튼" />
            <span class="login-is-prev">로그인</span>
          </a>
          <div class="signup-card">
            <div class="signup-form">
              <h1 class="heading-2">회원가입</h1>
              <div class="input-field email">
                <h3>이메일*</h3>
                <input type="email" placeholder="이메일을 입력해 주세요." />
              </div>
              <div class="input-field password">
                <h3>비밀번호*</h3>
                <input
                  type="password"
                  placeholder="비밀번호를 입력해 주세요.(숫자+영문 8자리 이상)"
                />
              </div>
              <div class="input-field save-password">
                <h3>비밀번호 확인*</h3>
                <input
                  type="password"
                  placeholder="비밀번호를 입력해 주세요."
                />
              </div>
              <div class="input-field name">
                <h3>이름*</h3>
                <input type="text" placeholder="이름을 입력해 주세요." />
              </div>
              <div class="input-field phone">
                <h3>전화번호</h3>
                <input
                  type="text"
                  placeholder="전화번호를 입력해 주세요.('-'하이픈을 뺀 숫자만 입력)"
                />
              </div>
              <div class="input-field birth">
                <h3>생년월일</h3>
                <input
                  type="text"
                  placeholder="생년월일을 입력해 주세요.(생년월일 6자리)"
                />
              </div>
            </div>
            <button class="btn btn-primary">가입하기</button>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
