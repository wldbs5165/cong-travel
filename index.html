<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      사용자 성향 기반 여행 추천 서비스 애플리케이션 프로젝트 - 로그인
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <section class="auth-section">
          <div class="auth-card">
            <header class="auth-header">
              <img src="assets/icons/logo.png" alt="메인 로고" />
              <div class="title">
                <h1 class="heading-1">여행을 시작해 볼까요?</h1>
                <h3>저장한 여행과 추천을 확인하려면 로그인해주세요.</h3>
              </div>
            </header>
            <div class="login-form">
              <div class="input-group">
                <div class="input-field email">
                  <img src="assets/icons/mail.png" alt="이메일 아이콘" />
                  <input
                    class="input-email"
                    type="email"
                    placeholder="이메일을 입력해 주세요."
                  />
                </div>
                <div class="input-field password">
                  <img src="assets/icons/password.png" alt="비밀번호 아이콘" />
                  <input
                    class="input-password"
                    type="password"
                    placeholder="비밀번호를 입력해 주세요."
                  />
                </div>
              </div>
              <a href="onboarding.html" class="btn btn-login">로그인</a>
              <a href="signup.html" class="btn btn-signup-outline">회원가입</a>
            </div>
          </div>
          <div class="login-sns">
            <div class="sns-title">
              <img src="assets/images/Line 2.png" alt="로그인 라인" />
              <span>SNS 로그인</span>
              <img src="assets/images/Line 2.png" alt="로그인 라인" />
            </div>
            <div class="sns-btn">
              <a href="#">
                <img src="assets/icons/google.png" alt="구글 로그인" />
              </a>
              <a href="#">
                <img src="assets/icons/kakao.png" alt="구글 로그인" />
              </a>
              <a href="#">
                <img src="assets/icons/naver.png" alt="구글 로그인" />
              </a>
              <a href="#">
                <img src="assets/icons/apple.png" alt="구글 로그인" />
              </a>
            </div>
          </div>
        </section>
      </div>
    </div>
  </body>
  <script type="module" src="./js/script.js"></script>
</html>
